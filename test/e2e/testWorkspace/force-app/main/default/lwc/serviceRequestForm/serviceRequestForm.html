<template>
  <lightning-card title="Service Request">
    <div class="slds-m-around_medium">
      <lightning-input
        label="Subject"
        value="{subject}"
        onchange="
          {
            handleSubjectChange;
          }
        "
      ></lightning-input>
      <lightning-combobox
        label="Priority"
        value="{priority}"
        options="{priorityOptions}"
        onchange="
          {
            handlePriorityChange;
          }
        "
      ></lightning-combobox>
      <div class="slds-m-top_medium">
        <lightning-button
          label="Submit"
          variant="brand"
          onclick="
            {
              handleSubmit;
            }
          "
        ></lightning-button>
      </div>
    </div>
  </lightning-card>
</template>
