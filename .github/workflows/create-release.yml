name: Create Release

on:
  workflow_dispatch:
    inputs:
      increment_type:
        description: 'Version increment type'
        required: false
        type: choice
        options: [patch, minor, major]
        default: patch

jobs:
  package:
    name: Package Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Bump version
        id: bump
        env:
          INCREMENT_TYPE: ${{ inputs.increment_type }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version "$INCREMENT_TYPE" --no-git-tag-version | sed 's/^v//')
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
      - run: yarn vscode:package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ steps.bump.outputs.version }}
          path: '*.vsix'

  tag-and-release:
    name: Tag & GitHub Release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.package.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: vsix-${{ needs.package.outputs.version }}
          path: ./extensions
      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git tag "v$RELEASE_VERSION"
          git push origin "v$RELEASE_VERSION"
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v$RELEASE_VERSION" ./extensions/*.vsix \
            --title "v$RELEASE_VERSION" \
            --generate-notes
